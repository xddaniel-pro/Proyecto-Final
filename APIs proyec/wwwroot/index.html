<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>APIs Proyec - Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI",sans-serif;
            background: #0b1220;
            color: #e5e7eb;
        }

        .card {
            background: #111827;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
        }

        h4 {
            color: #fff;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(90deg,#06b6d4,#6366f1);
            border: none;
        }

            .btn-primary:hover {
                opacity: 0.9;
            }

        .btn-outline-light {
            border: 1px solid rgba(255,255,255,0.2);
            color: #e5e7eb;
        }

            .btn-outline-light:hover {
                background: rgba(255,255,255,0.08);
            }

        .btn-danger {
            background: #ef4444;
            border: none;
        }

        .hero {
            padding: 20px 0;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .badge-soft {
            background: rgba(255,255,255,0.08);
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg,#7c3aed,#06b6d4);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="card p-4 shadow-lg">
                    <!-- HEADER -->
                    <div class="header">
                        <div class="logo"></div>
                        <div>
                            <h4 class="mb-0">APIs Proyec</h4>
                            <small class="text-muted">Panel de administración Oracle API</small>
                        </div>
                    </div>
                    <!-- HERO -->
                    <div class="hero">
                        <p class="mb-3">Bienvenido al panel de control. Administra productos, revisa vencimientos y ejecuta procedimientos.</p>
                        <div class="d-flex gap-2 flex-wrap">
                            <a href="/swagger" class="btn btn-primary">Swagger</a>
                            <button id="btn-products" class="btn btn-outline-light">Productos</button>
                            <button id="btn-vencer" class="btn btn-outline-light">Paquetes por vencer</button>
                            <button id="btn-top" class="btn btn-outline-light">Top vendidos</button>
                            <button id="btn-ejecutar" class="btn btn-danger">Ejecutar</button>
                        </div>
                        <small class="text-muted d-block mt-3">Consejo: revisa vencimientos antes de ejecutar procesos.</small>
                    </div>
                    <!-- RESULTADOS -->
                    <div id="products" class="mt-4"></div>
                    <div id="result" class="mt-3"></div>
                    <div class="text-end mt-4">
                        <small class="text-muted">Servidor local · IIS Express</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchProducts() {
            const target = document.getElementById('products');
            target.innerHTML = "<p class='text-muted'>Cargando...</p>";
            const res = await fetch('/api/productos');
            const data = await res.json();
            target.innerHTML = data.map(p => `
                    <div class="list-item">
                      <div>
                        <div class="fw-bold text-white">${p.nombre_producto}</div>
                        <small class="text-muted">ID: ${p.id_producto}</small>
                      </div>
                      <div class="text-end">
                        <div>$${p.precio}</div>
                        <span class="badge-soft">Stock ${p.stock}</span>
                      </div>
                    </div>`).join('');
        }

        async function fetchVencer() {
            const target = document.getElementById('products');
            target.innerHTML = "<p class='text-muted'>Cargando...</p>";
            const res = await fetch('/api/paquetes/vencer');
            const data = await res.json();
            target.innerHTML = data.map(p => `
                    <div class="list-item">
                      <div>
                        <div class="fw-bold text-white">${p.nombre_paquete}</div>
                        <small class="text-muted">Caduca: ${p.fecha_caducidad}</small>
                        <div>${p.descripcion}</div>
                      </div>
                      <div>$${p.precio_paquete}</div>
                    </div>`).join('');
        }

        async function fetchTop() {
            const target = document.getElementById('products');
            target.innerHTML = "<p class='text-muted'>Cargando...</p>";
            const res = await fetch('/api/productos/topvendidos');
            const data = await res.json();
            target.innerHTML = data.map(p => `
                    <div class="list-item">
                      <div class="fw-bold">${p.nombre_producto}</div>
                      <div class="badge-soft">Vendidos: ${p.vendidos}</div>
                    </div>`).join('');
        }

        async function ejecutar() {
            const result = document.getElementById('result');
            result.innerHTML = "<p class='text-muted'>Ejecutando...</p>";

            const res = await fetch('/api/paquetes/ejecutar-vencimiento');
            const data = await res.json();

            if (data.length === 0) {
                result.innerHTML = `<div class="alert alert-warning">No hay paquetes próximos a vencer</div>`;
            } else {
                result.innerHTML = data.map(p => `
            <div class="list-item">
              <div>
                <div class="fw-bold text-white">${p.nombre_paquete}</div>
                <small class="text-muted">Caduca: ${p.fecha_caducidad}</small>
                <div>${p.descripcion}</div>
              </div>
              <div>$${p.precio_paquete}</div>
            </div>
        `).join('');
            }
        }


        document.getElementById('btn-products').onclick = fetchProducts;
        document.getElementById('btn-vencer').onclick = fetchVencer;
        document.getElementById('btn-top').onclick = fetchTop;
        document.getElementById('btn-ejecutar').onclick = ejecutar;
    </script>
</body>
</html>
